name: Provider Smoke Tests

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run smoke tests
        run: |
          set -o pipefail
          bun test src/tests/e2e --timeout 360000 2>&1 | tee test-output.txt
        continue-on-error: true
        id: smoke
        env:
          HENTEPLAN_API_KEYS: ${{ secrets.HENTEPLAN_API_KEYS }}
      - name: Report results to status API
        if: always()
        run: |
          # Parse [status] lines emitted by smoke tests
          # Format: [status] provider=trv passed=10 total=10
          checks="["
          first=true
          while IFS= read -r line; do
            if [[ "$line" =~ \[status\]\ provider=([a-z]+)\ passed=([0-9]+)\ total=([0-9]+) ]]; then
              provider="${BASH_REMATCH[1]}"
              passed="${BASH_REMATCH[2]}"
              total="${BASH_REMATCH[3]}"
              if [ "$first" = true ]; then first=false; else checks+=","; fi
              checks+="{\"providerId\":\"$provider\",\"total\":$total,\"passed\":$passed}"
            fi
          done < test-output.txt

          if [ "$checks" != "[]" ]; then
            curl -s -X POST "https://henteplan.no/api/v1/status/report" \
              -H "Content-Type: application/json" \
              -H "x-api-key: $HENTEPLAN_API_KEY" \
              -d "{\"checks\":$checks}" || echo "Failed to report status (non-fatal)"
          fi
        env:
          HENTEPLAN_API_KEY: ${{ secrets.HENTEPLAN_API_KEY }}
      - name: Upload test output
        if: steps.smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 3
      - name: Create issue on failure
        if: steps.smoke.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'provider-alert', per_page: 5
            });
            if (!existing.data.some(i => i.title.startsWith('Provider smoke test'))) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Provider smoke test failure — ${new Date().toISOString().slice(0, 10)}`,
                body: `Daily smoke tests failed.\n\n[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                labels: ['provider-alert']
              });
            }
      - name: Fail workflow
        if: steps.smoke.outcome == 'failure'
        run: exit 1
